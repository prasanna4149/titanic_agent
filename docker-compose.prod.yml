services:
  titanic-agent:
    image: prasu4148/titanic-agent:latest
    container_name: titanic_agent
    restart: always
    ports:
      - "8000:8000"  # API Docs
      - "8501:8501"  # Streamlit UI
    environment:
      # MUST SET YOUR GROQ_API_KEY ON THE HOST SERVER BEFORE STARTING
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MODEL_NAME=llama-3.3-70b-versatile
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
