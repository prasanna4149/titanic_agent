services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titanic_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # These can also be set directly here (overrides .env)
      MODEL_NAME: ${MODEL_NAME:-llama-3.3-70b-versatile}
    volumes:
      # Mount data dir so you can swap the CSV without rebuilding
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: titanic_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # 'backend' resolves to the backend container via Docker's internal DNS
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
